<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="../css/form-style.css">
    <link rel="shortcut icon" href="../icons/icons8-car-16.png" type="image/x-icon">
</head>
<body>
    <article>
        <div class="header">
            <div class="left">
                <div>
                    <a href="../../index.html">
                        <img src="../images/icons8-arrow-left-50.png" alt="back"> Back
                    </a>
                </div>
            </div>
            <h1>Home work for CSS flexbox</h1>
            <div class="right"></div>
        </div>
        <form>
            <div class="form-elements">
                <fieldset class="form-element">
                    <legend>Personal info</legend>
                    <div class="fieldset-element">
                        <label for="first-name">
                            First name:
                        </label>
                        <input type="text" id="first-name" placeholder="Enter first name">
                    </div>
                    <div class="fieldset-element">
                        <label for="last-name">
                            Last name:
                        </label>
                        <input type="text" id="last-name" placeholder="Enter last name">
                    </div>
                    <div class="fieldset-element">
                        <label for="birthday">
                            Birthday:
                        </label>
                        <input type="datetime-local" id="birthday">
                    </div>
                    <div class="fieldset-element">
                        <div>
                            <label>
                                Gender:
                            </label>
                        </div>
                        <div class="gender">
                            <div>
                                <label for="male">Male</label>
                                <input type="radio" name="gender" id="male">
                            </div>
                            <div>
                                <label for="female">Female</label>
                                <input type="radio" name="gender" id="female">
                            </div>
                        </div>
                    </div>
                    <div class="fieldset-element">
                        <label for="sel-exp">
                            Drive experience:
                        </label>
                        <select name="exp" id="sel-exp">
                            <option value="---" selected>---</option>
                            <option value="1">expert</option>
                            <option value="2">more than 10</option>
                            <option value="3">5-10</option>
                            <option value="4">2-5</option>
                            <option value="5">less than 2</option>
                            <option value="6">beginner</option>
                        </select>
                    </div>
                </fieldset>
                <fieldset class="form-element">
                    <legend>Contacts</legend>
                    <div class="fieldset-element">
                        <label for="email">
                            Email:
                        </label>
                        <input type="email" id="email" placeholder="example@gmail.com">
                    </div>
                    <div class="fieldset-element">
                        <label for="tel">
                            Phone:
                        </label>
                        <input type="tel" id="tel" placeholder="+1 234 5678">
                    </div>
                    <div class="fieldset-element">
                        <label for="address">
                            Address:
                        </label>
                        <textarea id="address" rows="2" cols="30" placeholder="Enter address"></textarea>
                    </div>
                </fieldset>
                <fieldset class="form-element">
                    <legend>Car info</legend>
                    <div class="fieldset-element">
                        <label for="sel-brand">Brand:</label>
                        <select name="brand" id="sel-brand">
                            <option value="---" selected>---</option>
                            <option value="ford">Ford</option>
                            <option value="toyota">Toyota</option>
                            <option value="bmw">BMW</option>
                        </select>
                    </div>
                    <div class="fieldset-element">
                        <label for="sel-model">Model:</label>
                        <select name="model" id="sel-model">
                            <option value="---" selected>---</option>
                            <option value="mustang">Mustang</option>
                            <option value="f-150">F-150</option>
                            <option value="camry">Camry</option>
                            <option value="rav4">RAV4</option>
                            <option value="3-series">3 Series</option>
                            <option value="x5">X5</option>
                        </select>
                    </div>
                    <div class="fieldset-element used">
                        <label for="chb">
                            Used:
                        </label>
                        <input type="checkbox" id="chb">
                    </div>
                    <div>
                        <label for="color">
                            Color:
                        </label>
                        <div>
                            <label for="red">Red</label>
                            <input type="radio" name="color" id="red">
                            <label for="black">Black</label>
                            <input type="radio" name="color" id="black">
                            <label for="blue">Blue</label>
                            <input type="radio" name="color" id="blue">
                            <label for="white">White</label>
                            <input type="radio" name="color" id="white">
                            <label for="grey">Grey</label>
                            <input type="radio" name="color" id="grey">
                        </div>
                    </div>
                    <div class="fieldset-element-another">
                        <label for="range">Price ($k):</label>
                        <input 
                            type="range" 
                            id="range"
                            name="price"
                            min="0"
                            max="80"
                            step="10"
                            list="money"
                        >
                        <datalist id="money">
                            <option value="0" label="0"></option>
                            <option value="10" label="10"></option>
                            <option value="20" label="20"></option>
                            <option value="30" label="30"></option>
                            <option value="40" label="40"></option>
                            <option value="50" label="50"></option>
                            <option value="60" label="60"></option>
                            <option value="70" label="70"></option>
                            <option value="80" label="80"></option>
                        </datalist>
                    </div>
                </fieldset>
            </div>
            <div class="btns">
                <input type="reset" value="Cancel">
                <input type="submit" value="Ok">
            </div>
        </form>
    </article>
</body>
</html>
